name: Build and Release

on:
  release:
    types: [published]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-binaries:
    name: Build Standalone Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-pc-windows-msvc
    steps:
      - name: Setup repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set default version string
        run: |
          VERSION="${{ github.event.release.tag_name || github.event.pull_request.head.sha || github.sha }}"
          if [[ "${VERSION}" =~ ^[0-9a-f]{40}$ ]]; then
            VERSION="sha-${VERSION:0:7}"
          fi
          sed -i -e "s/dev-build/${VERSION}/g" src/config.ts

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.7.x

      - name: Build Dashboard
        run: deno task dashboard:build

      - name: Compile Binary
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            SUFFIX=".exe"
          else
            SUFFIX=""
          fi
          deno task compile:server --target ${{ matrix.target }} --output server-${{ matrix.target }}$SUFFIX src/server.ts

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-${{ matrix.target }}
          path: server-${{ matrix.target }}*

  release-binaries:
    name: Upload Binaries to Release
    needs: build-binaries
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./artifacts
          pattern: server-*
          merge-multiple: true

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ./artifacts/server-*

  release-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Setup repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set default version string
        run: |
          VERSION="${{ github.event.release.tag_name || github.event.pull_request.head.sha || github.sha }}"
          if [[ "${VERSION}" =~ ^[0-9a-f]{40}$ ]]; then
            VERSION="sha-${VERSION:0:7}"
          fi
          sed -i -e "s/dev-build/${VERSION}/g" src/config.ts

      - name: Log in to the Container registry
        if: github.event_name == 'release'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}